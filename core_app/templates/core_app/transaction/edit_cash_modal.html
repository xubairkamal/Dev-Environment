<div class="modal fade" id="editCashModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Cash Entry</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="editCashForm" onsubmit="event.preventDefault(); updateCashEntry();" novalidate>
                <div class="modal-body p-4">
                    <input type="hidden" id="intrcode">
                    <input type="hidden" id="intrvrsn">
                    <input type="hidden" id="bitrvnmb">
                    <input type="hidden" id="inamcode">
                    <input type="hidden" id="inyscode">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Transaction Date</label>
                            <input type="date" id="dttrdate" class="form-control border-primary" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Voucher Type</label>
                            <select id="invtcode" class="form-select select2-lookup-edit" data-type="voucher_types"
                                required>
                                <option value="">Select Voucher Type</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Cost Center</label>
                            <select id="incccode" class="form-select select2-lookup-edit" data-type="cost_centers"
                                required>
                                <option value="">Select Cost Center</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Account (COA)</label>
                            <select id="inaccode" class="form-select select2-lookup-edit" data-type="accounts" required>
                                <option value="">Select Account</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Department</label>
                            <select id="indpcode" class="form-select select2-lookup-edit" data-type="departments"
                                required>
                                <option value="">Select Department</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Amount</label>
                            <div class="input-group">
                                <span class="input-group-text bg-primary text-white border-primary">Rs.</span>
                                <input type="number" step="1" id="mntramnt" class="form-control border-primary fw-bold"
                                    required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold text-primary">Reference Title</label>
                            <input type="text" id="vctrtitl" class="form-control border-primary" required>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold text-primary">Detailed Description</label>
                            <textarea id="vctrdesc" class="form-control border-primary" rows="2"></textarea>
                        </div>

                        <div class="col-12 mt-4">
                            <hr class="text-muted">
                            <p class="text-muted small fw-bold">SYSTEM & OPTIONAL DETAILS</p>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label small text-muted">ID Code</label>
                            <input type="text" id="intrcode"
                                class="form-control form-control-sm bg-light text-center fw-bold" readonly>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small text-muted">Voucher Number</label>
                            <input type="text" id="vctrnmbr" class="form-control form-control-sm bg-light" readonly>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small text-muted">Invoice Ref</label>
                            <input type="text" id="vctrinvc" class="form-control form-control-sm border-secondary">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label small text-muted">Cheque Detail</label>
                            <input type="text" id="vctrchqd" class="form-control form-control-sm border-secondary">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label small text-muted">Version</label>
                            <input type="text" id="intrvrsn"
                                class="form-control form-control-sm bg-light text-center fw-bold" readonly>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-4" id="btnUpdateCash">
                        <i class="bi bi-save me-1"></i> Update Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // --- Global Configuration ---
    const ajaxHeaders = {
        'X-CSRFToken': '{{ csrf_token }}',
        'Content-Type': 'application/json',
        'X-Requested-With': 'XMLHttpRequest'
    };

    // --- Helper Functions ---
    function setSelect2Value(selector, id, text) {
        const $el = $(selector);
        $el.empty();
        if (id && id !== "0" && id !== "null") {
            const newOption = new Option(text || id, id, true, true);
            $el.append(newOption).trigger('change');
        } else {
            $el.val(null).trigger('change');
        }
    }

    // --- Grid Initialization (User Model Style) ---
    window.initCashDataTable = function () {
        if ($.fn.DataTable.isDataTable('#cashTable')) {
            $('#cashTable').DataTable().destroy();
        }
        $('#cashTable').DataTable({
            "stateSave": true,
            "paging": true,
            "pageLength": 10,
            "responsive": true,
            "order": [[0, "desc"]],
            "language": {
                "search": "",
                "searchPlaceholder": "Search transactions...",
                "paginate": {
                    "next": '<i class="bi bi-chevron-right"></i>',
                    "previous": '<i class="bi bi-chevron-left"></i>'
                }
            }
        });
    };

    // --- Modal Logic ---
    function openEditCashModal(data) {
        const $modal = $('#editCashModal');
        const $form = $('#editCashForm');

        $modal.modal('show');
        $form[0].reset();
        $('.is-invalid').removeClass('is-invalid');

        // Mapping Data to Form Fields
        $('#editCashForm #intrcode').val(data.intrcode);
        $('#editCashForm #intrvrsn').val(data.intrvrsn);
        $('#editCashForm #bitrvnmb').val(data.bitrvnmb);
        $('#editCashForm #inamcode').val(data.inamcode);
        $('#editCashForm #inyscode').val(data.inyscode);
        $('#editCashForm #dttrdate').val(data.dttrdate);
        $('#editCashForm #mntramnt').val(data.mntramnt);
        $('#editCashForm #vctrtitl').val(data.vctrtitl);
        $('#editCashForm #vctrdesc').val(data.vctrdesc);
        $('#editCashForm #vctrnmbr').val(data.vctrnmbr);
        $('#editCashForm #vctrinvc').val(data.vctrinvc);
        $('#editCashForm #vctrchqd').val(data.vctrchqd);

        // Initialize Select2 Lookups inside Modal
        $('#editCashForm .select2-lookup-edit').each(function () {
            const $this = $(this);
            if ($this.data('select2')) { $this.select2('destroy'); }
            $this.select2({
                theme: 'bootstrap-5',
                dropdownParent: $modal,
                width: '100%',
                ajax: {
                    url: "{% url 'core_app:get_transaction_lookup_ajax' %}",
                    data: params => ({ q: params.term, type: $this.data('type') }),
                    processResults: data => ({ results: data.results })
                }
            });
        });

        // Set Values for Select2 fields
        setTimeout(() => {
            setSelect2Value('#editCashForm #invtcode', data.invtcode, data.vcvtdesc);
            setSelect2Value('#editCashForm #inaccode', data.inaccode, data.vcacname);
            setSelect2Value('#editCashForm #indpcode', data.indpcode, data.vcdpdesc);
            setSelect2Value('#editCashForm #incccode', data.incccode, data.vcccdesc);
        }, 150);
    }

    // --- Action Logic ---
    function updateCashEntry() {
        const payload = {
            intrcode: $('#editCashForm #intrcode').val(),
            intrvrsn: $('#editCashForm #intrvrsn').val(),
            invtcode: $('#editCashForm #invtcode').val(),
            dttrdate: $('#editCashForm #dttrdate').val(),
            inaccode: $('#editCashForm #inaccode').val(),
            indpcode: $('#editCashForm #indpcode').val(),
            incccode: $('#editCashForm #incccode').val(),
            vctrtitl: $('#editCashForm #vctrtitl').val(),
            vctrdesc: $('#editCashForm #vctrdesc').val(),
            mntramnt: $('#editCashForm #mntramnt').val(),
            vctrinvc: $('#editCashForm #vctrinvc').val(),
            inamcode: $('#editCashForm #inamcode').val(),
            inyscode: $('#editCashForm #inyscode').val(),
            bitrvnmb: $('#editCashForm #bitrvnmb').val(),
            vctrnmbr: $('#editCashForm #vctrnmbr').val(),
            vctrchqd: $('#editCashForm #vctrchqd').val()
        };

        performCashAction("{% url 'core_app:update_transaction' %}", payload, '#btnUpdateCash', '#editCashModal');
    }

    function performCashAction(url, payload, btnSelector, modalSelector) {
        const $btn = $(btnSelector);
        const originalHtml = $btn.html();
        $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span>');

        $.ajax({
            url: url,
            type: 'POST',
            data: JSON.stringify(payload),
            headers: ajaxHeaders,
            success: function (res) {
                // User model style success check
                if (res.status === 'success' || res.success || res.status === 200 || res.status === 101) {
                    if (modalSelector) $(modalSelector).modal('hide');

                    // Success Alert
                    alert("Success: Record updated successfully!");

                    reloadCashTable();
                } else {
                    alert("Error: " + (res.message || 'Action failed'));
                    $btn.prop('disabled', false).html(originalHtml);
                }
            },
            error: function () {
                alert("Server error occurred.");
                $btn.prop('disabled', false).html(originalHtml);
            }
        });
    }

    // --- Reload Logic (The "User Model" Magic) ---
    function reloadCashTable() {
        $.ajax({
            url: "{% url 'core_app:cash_book' %}", // Main route for the cash grid
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function (html) {
                // Poora content area replace karein taake cache ka sawal hi paida na ho
                $('#main-content-area').html(html);

                // Re-init Table
                if (typeof initCashDataTable === 'function') {
                    initCashDataTable();
                }
            },
            error: function () {
                // Agar AJAX reload fail ho toh manual refresh (Safety net)
                window.location.reload();
            }
        });
    }

    // Initial Load
    $(document).ready(function () {
        initCashDataTable();
    });
</script>
