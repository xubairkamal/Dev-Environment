<div class="modal fade" id="addCashModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Add Cash Entry</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="addCashForm" novalidate>
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Transaction Date</label>
                            <input type="date" id="dttrdate" class="form-control border-primary" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Voucher Type</label>
                            <select id="invtcode" class="form-select select2-lookup" data-type="voucher_types" required>
                                <option value="">Select Voucher Type</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Cost Center</label>
                            <select id="incccode" class="form-select select2-lookup" data-type="cost_centers" required>
                                <option value="">Select Cost Center</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Account (COA)</label>
                            <select id="inaccode" class="form-select select2-lookup" data-type="accounts" required>
                                <option value="">Select Account</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Department</label>
                            <select id="indpcode" class="form-select select2-lookup" data-type="departments" required>
                                <option value="">Select Department</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Service / Company</label>
                            <select id="inamcode" class="form-select select2-lookup" data-type="services" disabled
                                required>
                                <option value="">Select Service</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Transaction Status</label>
                            <select id="inyscode" class="form-select select2-lookup" data-type="status" required>
                                <option value="">Select Status</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-primary">Amount</label>
                            <div class="input-group">
                                <span class="input-group-text bg-primary text-white border-primary">Rs.</span>
                                <input type="number" step="1" id="mntramnt" class="form-control border-primary fw-bold"
                                    placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold text-primary">Reference Title</label>
                            <input type="text" id="vctrtitl" class="form-control border-primary"
                                placeholder="e.g. Utility, Vendor Payment" required>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold text-primary">Detailed Description</label>
                            <textarea id="vctrdesc" class="form-control border-primary" rows="2"
                                placeholder="Enter transaction details here..."></textarea>
                        </div>

                        <div class="col-12 mt-4">
                            <hr class="text-muted">
                            <p class="text-muted small fw-bold">SYSTEM & OPTIONAL DETAILS</p>
                        </div>

                        <div class="row g-2">
                            <div class="col-md-3">
                                <label class="small text-muted">System Code</label>
                                <input type="text" id="intrcode" class="form-control form-control-sm bg-light" readonly
                                    placeholder="Auto Generated">
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted">Voucher Code</label>
                                <input type="text" id="bitrvnmb" class="form-control form-control-sm bg-light" readonly
                                    placeholder="Auto Generated">
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted">Voucher Number</label>
                                <input type="text" id="vctrnmbr" class="form-control form-control-sm bg-light" readonly
                                    placeholder="Auto Generated">
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted">Voucher Month</label>
                                <input type="text" id="vctrmnth" class="form-control form-control-sm bg-light" readonly>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small text-muted">Invoice Ref</label>
                            <input type="text" id="vctrinvc" class="form-control form-control-sm"
                                placeholder="Invoice #">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small text-muted">Cheque Detail</label>
                            <input type="text" id="vctrchqd" class="form-control form-control-sm"
                                placeholder="Cheque # if any">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small text-muted">Version</label>
                            <input type="text" id="intrvrsn" class="form-control form-control-sm bg-light" value="0"
                                disabled>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success px-4" id="btnSaveCash">
                        <i class="bi bi-save me-1"></i> Save Transaction
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
