<div class="modal fade" id="editJournalModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Journal Entry</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="editJournalForm" novalidate>
                <input type="hidden" id="ingjcode">
                <input type="hidden" id="inamcode">
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Transaction Date</label>
                            <input type="date" id="dtgjdate" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Journal #</label>
                            <input type="text" id="vcgjnmbr" class="form-control bg-light fw-bold" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-danger">Debit Account (DR)</label>
                            <select id="indrcode" class="form-select select2-lookup-edit" data-type="account"
                                required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-success">Credit Account (CR)</label>
                            <select id="incrcode" class="form-select select2-lookup-edit" data-type="account"
                                required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Amount</label>
                            <input type="number" id="mngjamnt" class="form-control fw-bold border-primary" step="0.01"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Department</label>
                            <select id="indpcode" class="form-select select2-lookup-edit"
                                data-type="department"></select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Narration</label>
                            <textarea id="vcgjdesc" class="form-control" rows="2" required></textarea>
                        </div>
                        <div class="row g-2 mt-2 border-top pt-2">
                            <div class="col-md-4">
                                <label class="small text-muted">Status</label>
                                <select id="inyscode" class="form-select form-select-sm select2-lookup-edit"
                                    data-type="statuses"></select>
                            </div>
                            <div class="col-md-4 text-center">
                                <label class="small text-muted">Version</label>
                                <input type="text" id="ingjvrsn"
                                    class="form-control form-control-sm bg-light text-center" readonly>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-4" id="btnUpdateJournal">Update Entry</button>
                </div>
            </form>
        </div>
    </div>
</div>
