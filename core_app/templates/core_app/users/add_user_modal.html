<div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">
                    <i class="bi bi-person-plus-fill me-2"></i>Add New User
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>

            <div class="modal-body p-4">
                <form id="addUserForm" autocomplete="off">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                <input type="text" id="add_txtUsername" class="form-control" 
                                    placeholder="e.g. adeel.arif" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-card-text"></i></span>
                                <input type="text" id="add_txtFullName" class="form-control" 
                                    placeholder="Enter user's display name" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                                <input type="password" id="add_txtPassword" class="form-control" 
                                    placeholder="Create a secure password" required autocomplete="new-password">
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">User Status</label>
                            <select id="add_ddlStatus" class="form-select select2-lookup" data-type="status"
                                data-placeholder="Select Status" required style="width: 100%;">
                                <option value=""></option>
                            </select>
                            <div class="form-text small text-muted">Initial status for this user account.</div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer bg-light border-top-0">
                <button type="button" class="btn btn-white border px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success px-4 d-flex align-items-center gap-2" id="btnCreateUser"
                    onclick="createUser()">
                    <i class="bi bi-check-lg"></i> <span>Save User Account</span>
                </button>
            </div>
        </div>
    </div>
</div>
